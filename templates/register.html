<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RegexEdu – Register</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
</head>
<body class="auth-body">
  <div class="auth-bg">
    <canvas id="matrixCanvas"></canvas>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-icon">
          <span class="bracket">[</span><span class="regex-char">.*</span><span class="bracket">]</span>
        </div>
        <h1 class="brand-name">RegexEdu</h1>
        <p class="brand-tagline">Create Your Account</p>
      </div>

      <div id="register-error" class="auth-error hidden"></div>
      <div id="register-success" class="auth-success hidden"></div>

      <div class="form-group">
        <label class="form-label" for="register-name">Full Name</label>
        <div class="input-wrapper">
          <span class="input-prefix">~</span>
          <input type="text" id="register-name" class="form-input" placeholder="Your Name" autocomplete="name"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="register-email">Email</label>
        <div class="input-wrapper">
          <span class="input-prefix">@</span>
          <input type="email" id="register-email" class="form-input" placeholder="you@example.com" autocomplete="email"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="register-password">Password</label>
        <div class="input-wrapper">
          <span class="input-prefix">#</span>
          <input type="password" id="register-password" class="form-input" placeholder="••••••••" autocomplete="new-password"/>
        </div>
      </div>

      <button class="btn-primary" onclick="registerUser()">
        <span class="btn-text">CREATE ACCOUNT</span>
        <span class="btn-arrow">→</span>
      </button>

      <p class="auth-link">Already registered? <a href="/login">Login here</a></p>
    </div>

    <div class="auth-decoration">
      <div class="code-snippet">
        <span class="cs-comment">// validate name</span><br/>
        <span class="cs-const">const</span> name = <span class="cs-str">/^[A-Za-z\s]{2,}$/</span>;<br/>
        <span class="cs-comment">// join the class →</span>
      </div>
    </div>
  </div>

  <script src="/static/js/script.js"></script>
  <script>initMatrix('matrixCanvas');</script>
</body>
</html>
