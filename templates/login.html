<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RegexEdu – Login</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
</head>
<body class="auth-body">
  <div class="auth-bg">
    <canvas id="matrixCanvas"></canvas>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-icon">
          <span class="bracket">[</span><span class="regex-char">.*</span><span class="bracket">]</span>
        </div>
        <h1 class="brand-name">RegexEdu</h1>
        <p class="brand-tagline">Compiler Learning Tool</p>
      </div>

      <div id="login-error" class="auth-error hidden"></div>

      <div class="form-group">
        <label class="form-label" for="login-email">Email</label>
        <div class="input-wrapper">
          <span class="input-prefix">@</span>
          <input type="email" id="login-email" class="form-input" placeholder="you@example.com" autocomplete="email"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <div class="input-wrapper">
          <span class="input-prefix">#</span>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" autocomplete="current-password"/>
        </div>
      </div>

      <button class="btn-primary" onclick="loginUser()">
        <span class="btn-text">LOGIN</span>
        <span class="btn-arrow">→</span>
      </button>

      <p class="auth-link">No account? <a href="/register">Register here</a></p>
    </div>

    <div class="auth-decoration">
      <div class="code-snippet">
        <span class="cs-comment">// match email pattern</span><br/>
        <span class="cs-const">const</span> regex = <span class="cs-str">/^[\w.-]+@[\w.-]+\.\w+$/</span>;<br/>
        <span class="cs-comment">// start learning →</span>
      </div>
    </div>
  </div>

  <script src="/static/js/script.js"></script>
  <script>initMatrix('matrixCanvas');</script>
</body>
</html>
